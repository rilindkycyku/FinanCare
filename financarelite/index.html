<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/img/web/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="FinanCareLite - gjenero fatura lokalisht, pa nevojë për server"
    />
    <link rel="apple-touch-icon" href="/img/web/apple-touch-icon.png" />
    <title>FinanCareLite</title>
  </head>
  <body>
    <script>
      // Applied before React mounts so there's no flash of the wrong theme on load.
      (function () {
        try {
          if (localStorage.getItem("financarelite-theme") === "light") {
            document.body.classList.add("light-mode");
          }
        } catch (e) {
          /* localStorage unavailable — default dark theme stands */
        }
      })();
    </script>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
