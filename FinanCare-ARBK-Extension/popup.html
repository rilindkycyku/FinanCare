<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; padding: 20px; font-family: 'Segoe UI', system-ui, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; }
    h3 { margin-top: 0; color: #10b981; font-size: 18px; border-bottom: 1px solid #334155; padding-bottom: 12px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;}
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 13px; color: #94a3b8; font-weight: 500;}
    input[type="text"] { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; font-size: 14px; transition: border-color 0.2s;}
    input[type="text"]:focus { outline: none; border-color: #10b981; }
    .checkbox-wrapper { display: flex; align-items: center; gap: 10px; font-size: 15px; cursor: pointer;}
    .checkbox-wrapper input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #10b981; }
    button { width: 100%; padding: 12px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 15px; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);}
    button:hover { transform: translateY(-1px); box-shadow: 0 6px 8px -1px rgba(16, 185, 129, 0.3); }
    button:active { transform: translateY(0); }
    .status { margin-top: 12px; font-size: 13px; color: #34d399; text-align: center; display: none; font-weight: 500; }
  </style>
</head>
<body>
  <h3>
    <svg style="width:20px;height:20px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
    FinanCare Bridge
  </h3>
  
  <label class="form-group checkbox-wrapper">
    <input type="checkbox" id="enableBtn">
    <span style="color: #e2e8f0; font-weight: 500;">Aktivizo butonin në ARBK</span>
  </label>

  <div class="form-group">
    <label for="fcUrl">URL ose Porti i FinanCare</label>
    <input type="text" id="fcUrl" placeholder="psh. localhost, 127.0.0.1, financare.app">
  </div>

  <button id="saveBtn">Ruaj Konfigurimet</button>
  <div id="status" class="status">✓ U ruajt me sukses! Rifresko ARBK.</div>

  <script src="popup.js"></script>
</body>
</html>
